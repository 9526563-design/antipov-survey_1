{% extends "base.html" %}
{% block content %}
<div style="max-width:460px; margin:60px auto;">
  <div class="card" style="text-align:center;">
    <div style="font-size:2.5em; margin-bottom:12px;">🔑</div>
    <h1 style="color:#1F4E79; margin-bottom:8px;">Продолжить прохождение</h1>
    <p style="color:#666; margin-bottom:24px; font-size:0.95em;">
      Введите код, который вы получили при приостановке опросника.
    </p>

    {% if error %}
    <div style="background:#fde8e8; border-left:4px solid #e74c3c; padding:12px 16px; border-radius:6px; margin-bottom:20px; color:#c0392b; font-size:0.9em;">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <input type="text" name="code" placeholder="XXXX-XXXX"
             style="width:100%; padding:14px; font-size:1.4em; font-family:monospace; font-weight:700;
                    letter-spacing:4px; text-align:center; text-transform:uppercase;
                    border:2px solid #1F4E79; border-radius:10px; margin-bottom:16px;"
             maxlength="9" required autocomplete="off" autocapitalize="characters">
      <button type="submit" class="btn btn-primary" style="width:100%; padding:14px; font-size:1em;">
        Продолжить →
      </button>
    </form>

    <p style="margin-top:20px; font-size:0.85em; color:#aaa;">
      <a href="/" style="color:#1F4E79;">← Вернуться на главную</a>
    </p>
  </div>
</div>

<script>
// Автоформат кода при вводе: добавляем дефис после 4 символов
document.querySelector('input[name=code]').addEventListener('input', function(e) {
  let val = e.target.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
  if (val.length > 4) val = val.slice(0,4) + '-' + val.slice(4,8);
  e.target.value = val;
});
</script>
{% endblock %}
